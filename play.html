<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post-Error Policy Probe</title>
</head>
<body>
  <script>
    const ENDPOINTS = [
      "https://script.google.com/macros/s/AKfycbxRfWPZ7UBGUx24QJUbQlhVx9iUhEeJ9O6oXorThwvPKHO_K2kbiUvirIOXtszZEm9L/exec",
      "https://script.google.com/macros/s/AKfycby29irYRz84G0sVmQxrxTuPcdlpNIU_CVsh6mHP6YOPe5qNToZkzX6ge3OpI_YJ6pGnXw/exec",
      "https://script.google.com/macros/s/AKfycbzVKtOL9hKZmx2VJLulkScCUTUk0GpZ2qIWa4mItzVB5z88-eETyQHoJTiQTmEDLeNMlQ/exec"
    ];
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwR9vPmUEjrhQUFNCVJayp9JfuVwtJtOW05InqxErFvYFLApxDUGxYO4L_Ybh8y6tQhlQ/exec";

    function replaceAllText(html, from, to) {
      return html.split(from).join(to);
    }

    function patchEndpoint(html) {
      ENDPOINTS.forEach(endpoint => {
        html = replaceAllText(html, endpoint, WEB_APP_URL);
      });
      return html;
    }

    function patchTrialSaving(html) {
      html = html.replace(
        "let trialsData = [];\n        let trialList = [];",
        "let trialsData = [];\n        let pendingTrialRecords = [];\n        let trialSubmissionChain = Promise.resolve();\n        let trialList = [];"
      );

      html = html.replace(
        "trialsData.push(trialRecord);\n\n            targetLeft.style.display = \"none\";",
        "trialsData.push(trialRecord);\n            queueTrialSubmission(trialRecord);\n\n            targetLeft.style.display = \"none\";"
      );

      html = html.replace(
        "        async function endExperiment() {",
        `        function queueTrialSubmission(trialRecord) {
            if (WEB_APP_URL === "YOUR_WEB_APP_URL_HERE") return;

            pendingTrialRecords.push(trialRecord);
            trialSubmissionChain = trialSubmissionChain.then(flushPendingTrialRecords);
            return trialSubmissionChain;
        }

        async function flushPendingTrialRecords() {
            while (pendingTrialRecords.length > 0) {
                const nextRecord = pendingTrialRecords[0];
                try {
                    await fetch(WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify([nextRecord])
                    });
                    pendingTrialRecords.shift();
                } catch (error) {
                    console.error("Trial-by-trial save failed; will retry at task end:", error);
                    break;
                }
            }
        }

        async function endExperiment() {`
      );

      html = html.replace(
        `                // 3. POST data to save
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(trialsData)
                });

                document.getElementById("final-subtext").innerText = "Your data was saved. Fetching community statistics...";`,
        `                // 3. Wait for any trial-by-trial saves still in progress.
                await trialSubmissionChain;
                if (pendingTrialRecords.length > 0) {
                    await flushPendingTrialRecords();
                }

                if (pendingTrialRecords.length > 0) {
                    document.getElementById("final-subtext").innerText = "Your summary is below. Some trial rows could not be saved yet.";
                } else {
                    document.getElementById("final-subtext").innerText = "Your trial data was saved. Fetching community statistics...";
                }`
      );

      return html;
    }

    function patchDemographics(html) {
      if (!html.includes('id="gender"')) {
        html = html.replace(
          `                <label>Dominant hand
                    <select id="dominant-hand" required>
                        <option value="">Select one</option>
                        <option value="Right">Right</option>
                        <option value="Left">Left</option>
                        <option value="Ambidextrous">Ambidextrous</option>
                    </select>
                </label>`,
          `                <label>Dominant hand
                    <select id="dominant-hand" required>
                        <option value="">Select one</option>
                        <option value="Right">Right</option>
                        <option value="Left">Left</option>
                        <option value="Ambidextrous">Ambidextrous</option>
                    </select>
                </label>
                <label>Gender
                    <select id="gender" required>
                        <option value="">Select one</option>
                        <option value="Woman">Woman</option>
                        <option value="Man">Man</option>
                        <option value="Non-binary">Non-binary</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                </label>`
        );
      }

      if (!html.includes('id="age"')) {
        html = html.replace(
          `                <label>Gender
                    <select id="gender" required>
                        <option value="">Select one</option>
                        <option value="Woman">Woman</option>
                        <option value="Man">Man</option>
                        <option value="Non-binary">Non-binary</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                </label>`,
          `                <label>Gender
                    <select id="gender" required>
                        <option value="">Select one</option>
                        <option value="Woman">Woman</option>
                        <option value="Man">Man</option>
                        <option value="Non-binary">Non-binary</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                </label>
                <label>Age
                    <input type="number" id="age" min="0" max="120" placeholder="Optional">
                </label>`
        );
      }

      html = html.replace(
        `                    <input type="number" id="age" min="18" max="100" required placeholder="18-100">`,
        `                    <input type="number" id="age" min="0" max="120" placeholder="Optional">`
      );
      html = html.replace(
        `                    <input type="number" id="age" min="18" max="100" placeholder="Optional">`,
        `                    <input type="number" id="age" min="0" max="120" placeholder="Optional">`
      );

      if (!html.includes('const genderInput = document.getElementById("gender");')) {
        html = html.replace(
          `        const dominantHandInput = document.getElementById("dominant-hand");`,
          `        const dominantHandInput = document.getElementById("dominant-hand");
        const genderInput = document.getElementById("gender");`
        );
      }

      if (!html.includes('const ageInput = document.getElementById("age");')) {
        html = html.replace(
          `        const genderInput = document.getElementById("gender");`,
          `        const genderInput = document.getElementById("gender");
        const ageInput = document.getElementById("age");`
        );
      }

      if (!html.includes('if (!genderInput.value)')) {
        html = html.replace(
          `            if (!dominantHandInput.value) {
                dominantHandInput.focus();
                dominantHandInput.reportValidity();
                return;
            }

            participantId = partIdInput.value.trim() || "P" + Math.random().toString(36).substring(2, 8).toUpperCase();`,
          `            if (!dominantHandInput.value) {
                dominantHandInput.focus();
                dominantHandInput.reportValidity();
                return;
            }
            if (!genderInput.value) {
                genderInput.focus();
                genderInput.reportValidity();
                return;
            }

            participantId = partIdInput.value.trim() || "P" + Math.random().toString(36).substring(2, 8).toUpperCase();`
        );
      }

      html = html.replace(
        `            if (!ageInput.value) {
                ageInput.focus();
                ageInput.reportValidity();
                return;
            }

            participantId = partIdInput.value.trim() || "P" + Math.random().toString(36).substring(2, 8).toUpperCase();`,
        `            if (ageInput.value && !ageInput.reportValidity()) {
                return;
            }

            const participantAge = ageInput.value.trim() === "" ? "" : Number(ageInput.value);
            participantId = partIdInput.value.trim() || "P" + Math.random().toString(36).substring(2, 8).toUpperCase();`
      );

      if (!html.includes('const participantAge = ageInput.value.trim()')) {
        html = html.replace(
          `            participantId = partIdInput.value.trim() || "P" + Math.random().toString(36).substring(2, 8).toUpperCase();`,
          `            if (ageInput.value && !ageInput.reportValidity()) {
                return;
            }

            const participantAge = ageInput.value.trim() === "" ? "" : Number(ageInput.value);
            participantId = partIdInput.value.trim() || "P" + Math.random().toString(36).substring(2, 8).toUpperCase();`
        );
      }

      if (!html.includes('Gender: genderInput.value')) {
        html = html.replace(
          `                Dominant_Hand: dominantHandInput.value,
                Viewport_Width: window.innerWidth,`,
          `                Dominant_Hand: dominantHandInput.value,
                Gender: genderInput.value,
                Viewport_Width: window.innerWidth,`
        );
      }

      html = html.replace(
        `                Age: Number(ageInput.value),`,
        `                Age: participantAge,`
      );

      if (!html.includes('Age: participantAge')) {
        html = html.replace(
          `                Gender: genderInput.value,
                Viewport_Width: window.innerWidth,`,
          `                Gender: genderInput.value,
                Age: participantAge,
                Viewport_Width: window.innerWidth,`
        );
      }

      if (!html.includes('Gender: participantMeta.Gender')) {
        html = html.replace(
          `                Participant_ID: participantId,
                Dominant_Hand: participantMeta.Dominant_Hand,
                Experiment_Version: participantMeta.Experiment_Version,`,
          `                Participant_ID: participantId,
                Dominant_Hand: participantMeta.Dominant_Hand,
                Gender: participantMeta.Gender,
                Experiment_Version: participantMeta.Experiment_Version,`
        );
      }

      if (!html.includes('Age: participantMeta.Age')) {
        html = html.replace(
          `                Gender: participantMeta.Gender,
                Experiment_Version: participantMeta.Experiment_Version,`,
          `                Gender: participantMeta.Gender,
                Age: participantMeta.Age,
                Experiment_Version: participantMeta.Experiment_Version,`
        );
      }

      return html;
    }

    function patchThankYouOnly(html) {
      html = html.replace(
        /<div id="results-screen" class="screen">[\s\S]*?<\/div>\s*<\/div>\s*<script>/,
        `<div id="results-screen" class="screen">
        <div class="container">
            <h1 id="final-message">Thank you for participating.</h1>
            <p id="final-subtext">Your responses have been recorded.</p>
        </div>
    </div>

    <script>`
      );

      html = html.replace(
        /async function endExperiment\(\) \{[\s\S]*?\n        \}\n\n        function calculateUserSummary\(\)/,
        `async function endExperiment() {
            document.body.style.cursor = "default";
            taskScreen.style.display = "none";
            resultsScreen.style.display = "flex";

            if (WEB_APP_URL === "YOUR_WEB_APP_URL_HERE") {
                console.log(JSON.stringify(trialsData, null, 2));
                return;
            }

            try {
                await trialSubmissionChain;
                if (pendingTrialRecords.length > 0) {
                    await flushPendingTrialRecords();
                }
            } catch (error) {
                console.error("Network/Fetch error:", error);
            }
        }

        function calculateUserSummary()`
      );

      return html;
    }

    fetch("index.html", { cache: "no-store" })
      .then(response => response.text())
      .then(html => {
        document.open();
        document.write(patchThankYouOnly(patchDemographics(patchTrialSaving(patchEndpoint(html)))));
        document.close();
      })
      .catch(error => {
        document.body.textContent = "Unable to load experiment.";
        console.error(error);
      });
  </script>
</body>
</html>
